<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeny Gorden Pro - Official Report</title>
    <style>
        :root {
            --bg-body: #0f172a; --bg-card: #1e293b; --bg-input: #020617;
            --text-main: #ffffff; --text-dim: #fbbf24; --accent: #3b82f6;
            --success: #22c55e; --danger: #ef4444; --border: #475569;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; }

        /* UI Input Style */
        .card { background: #020617; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .window-item { background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 6px solid var(--accent); position: relative; }
        .grid { display: grid; gap: 8px; margin-bottom: 8px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        
        label { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 2px; }
        
        /* Input perbaikan warna teks agar terlihat (Tidak Hitam) */
        input, select, textarea { 
            width: 100%; background: var(--bg-input); border: 1px solid var(--border); 
            color: #ffffff !important; padding: 8px; border-radius: 6px; font-size: 14px; 
            font-weight: 700; text-align: center; 
        }
        input::placeholder { color: #64748b; font-weight: 400; }

        .btn-add { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 900; cursor: pointer; margin-bottom: 20px; }
        .footer-fixed { position: sticky; bottom: 10px; background: #020617; padding: 15px; border-radius: 12px; border: 2px solid var(--accent); z-index: 10; }
        .grand-total { color: var(--success); font-size: 20px; font-weight: 900; text-align: center; margin-bottom: 10px; }
        .hidden { display: none !important; }

        /* Report Branding Header */
        .rep-header-box { display: flex; align-items: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 10px; }
        .rep-logo { width: 70px; height: 70px; object-fit: contain; margin-right: 15px; border: 1px dashed #ccc; }
        .rep-store-info { text-align: left; }
        .rep-store-info h2 { margin: 0; font-size: 18px; text-transform: uppercase; color: #000; }
        .rep-store-info p { margin: 0; font-size: 12px; color: #333; font-weight: bold; }
        
        .date-info { font-size: 10px; text-align: right; margin-bottom: 10px; color: #444; }

        /* Report Style */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 10px; overflow-y: auto; }
        .modal-content { background: #fff; color: #000; max-width: 800px; margin: 0 auto; padding: 20px; border-radius: 10px; }
        .rep-item { border: 1px solid #000; padding: 10px; margin-bottom: 8px; border-radius: 5px; }
        .rincian-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .rincian-table td { border-bottom: 1px solid #eee; padding: 3px 0; }

        @media print {
            .no-print { display: none !important; }
            .modal { position: absolute; display: block; background: white; width: 100%; }
            .modal-content { padding: 0; width: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>

    <div class="container no-print">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 id="display-store-name" style="margin:0; color:var(--accent); font-weight:900;">YENY GORDEN</h2>
            <button onclick="openSettings()" style="background:none; border:none; font-size:22px; cursor:pointer;">⚙️</button>
        </div>

        <div class="dashboard" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px;">
            <button onclick="setMode('lo')" id="btn-lo" style="padding:10px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; background:var(--bg-card); color:white;">LOKAL</button>
            <button onclick="setMode('im')" id="btn-im" style="padding:10px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; background:var(--bg-card); color:white;">IMPORT</button>
            <button onclick="setMode('bl')" id="btn-bl" style="padding:10px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; background:var(--bg-card); color:white;">BLINDS</button>
        </div>

        <div id="window-container"></div>
        <button class="btn-add" onclick="addWindow()">+ TAMBAH ITEM JENDELA</button>

        <div class="footer-fixed">
            <div id="grand-total" class="grand-total">TOTAL: Rp 0</div>
            <div class="grid grid-3">
                <button onclick="prepReport('estimasi')" style="background:#8b5cf6; color:white; border:none; padding:12px; border-radius:8px; font-weight:900; font-size:10px;">ESTIMASI</button>
                <button onclick="prepReport('spk')" style="background:var(--success); color:white; border:none; padding:12px; border-radius:8px; font-weight:900; font-size:10px;">SPK / SJ</button>
                <button onclick="showReport('rincian')" style="background:#f97316; color:white; border:none; padding:12px; border-radius:8px; font-weight:900; font-size:10px;">RINCIAN</button>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal" style="display:none; align-items:center; justify-content:center;">
        <div class="modal-content" style="max-width:350px; background:var(--bg-card); color:#fff;">
            <h3 style="text-align:center">PENGATURAN TOKO</h3>
            <label>Nama Toko</label><input type="text" id="set-name" placeholder="Nama Toko"><br>
            <label>WhatsApp</label><input type="number" id="set-wa" placeholder="08xxx"><br>
            <label>Logo Toko</label><input type="file" accept="image/*" onchange="uploadLogo(this)"><br>
            <button onclick="saveSettings()" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; font-weight:bold; border-radius:5px;">SIMPAN</button>
        </div>
    </div>

    <div id="modal-cust" class="modal" style="display:none; align-items:center; justify-content:center;">
        <div class="modal-content" style="max-width:350px; background: #fff; border: 2px solid var(--accent);">
            <h3 style="text-align:center; color:#000;">Data Konsumen</h3>
            <label style="color:#666">Nama Konsumen</label>
            <input type="text" id="c-name" placeholder="Input Nama" style="background:#f1f5f9; color:#000 !important; border:1px solid #cbd5e1; margin-bottom:10px;">
            
            <label style="color:#666">No. Telepon</label>
            <input type="number" id="c-phone" placeholder="081234xxx" style="background:#f1f5f9; color:#000 !important; border:1px solid #cbd5e1; margin-bottom:10px;">
            
            <label style="color:#666">Alamat Lengkap</label>
            <textarea id="c-addr" placeholder="Input Alamat" style="background:#f1f5f9; color:#000 !important; border:1px solid #cbd5e1; width:100%; height:60px; border-radius:6px; padding:8px; font-weight:bold; text-align:center;"></textarea>
            
            <br><br>
            <button id="btn-go" style="width:100%; padding:15px; background:var(--success); color:white; border:none; font-weight:900; border-radius:8px;">BUAT LAPORAN</button>
            <button onclick="document.getElementById('modal-cust').style.display='none'" style="width:100%; margin-top:5px; background:none; border:none; color:red; font-size:12px;">Batal</button>
        </div>
    </div>

    <div id="modal-report" class="modal">
        <div class="modal-content">
            <div id="rep-branding"></div>
            <div class="date-info" id="rep-date-area"></div>
            <div id="rep-cust-info" style="margin-bottom:15px; font-size:13px;"></div>
            <div id="rep-list"></div>
            <div id="rep-footer"></div>
            <div class="no-print" style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button onclick="window.print()" style="padding:15px; background:#000; color:#fff; border:none; font-weight:900; border-radius:8px;">CETAK / PDF</button>
                <button onclick="document.getElementById('modal-report').style.display='none'" style="padding:15px; background:var(--danger); color:#fff; border:none; font-weight:900; border-radius:8px;">TUTUP</button>
            </div>
        </div>
    </div>

    <template id="tmp-win">
        <div class="window-item">
            <button onclick="this.closest('.window-item').remove(); calculateAll();" style="position:absolute; top:10px; right:10px; background:red; color:white; border:none; border-radius:50%; width:24px; height:24px; cursor:pointer;">×</button>
            <input type="text" class="win-name" value="Jendela" style="background:transparent; border:none; color:var(--text-dim); text-align:left; font-weight:900; margin-bottom:10px;">
            
            <div class="f-gorden">
                <div class="grid grid-2">
                    <div><label>Nama Kain</label><input type="text" class="in-nk" placeholder="Contoh: Megan MGA1" oninput="calculateAll()"></div>
                    <div><label>Harga Kain</label><input type="number" class="in-hk" placeholder="150000" oninput="calculateAll()"></div>
                </div>
                <div class="grid grid-3">
                    <div><label>Lebar</label><input type="number" step="0.01" class="in-l" placeholder="1.5" oninput="calculateAll()"></div>
                    <div><label>Tinggi</label><input type="number" step="0.01" class="in-t" placeholder="2.5" oninput="calculateAll()"></div>
                    <div><label>Panel</label><input type="number" class="in-p" value="1" oninput="calculateAll()"></div>
                </div>
                <div class="grid grid-2">
                    <div><label>Model</label><select class="sel-m" onchange="calculateAll()"><option value="Smokring">Smokring</option><option value="Plisket">Plisket</option><option value="Spiral">Spiral</option></select></div>
                    <div><label>Vitrase?</label><select class="sel-v" onchange="toggleVit(this)"><option value="tidak">TIDAK</option><option value="ya">YA</option></select></div>
                </div>
                <div class="vit-box hidden" style="border:1px dashed var(--border); padding:10px; border-radius:8px; margin-top:10px;">
                    <div class="grid grid-2">
                        <div><label>Nama Vitrase</label><input type="text" class="in-nv" placeholder="VPAB WH" oninput="calculateAll()"></div>
                        <div><label>Harga Vit</label><input type="number" class="in-hv" placeholder="100000" oninput="calculateAll()"></div>
                    </div>
                    <div class="grid grid-2">
                        <div><label>Model Vit</label><select class="sel-vm" onchange="toggleSpiral(this)"><option value="Plisket">Plisket</option><option value="Spiral">Spiral</option></select></div>
                        <div class="sp-qty hidden"><label>Qty</label><input type="number" class="in-vq" value="1" oninput="calculateAll()"></div>
                    </div>
                    <div class="sp-dim hidden" style="margin-top:5px;"><div class="grid grid-2">
                        <div><label>LEBAR</label><input type="number" step="0.01" class="in-vl" placeholder="0.5" oninput="calculateAll()"></div>
                        <div><label>TINGGI</label><input type="number" step="0.01" class="in-vt" placeholder="1.6" oninput="calculateAll()"></div>
                    </div></div>
                </div>
            </div>

            <div class="f-blinds hidden">
                <div class="grid grid-2">
                    <div><label>Nama Blinds</label><input type="text" class="in-bl-n" placeholder="Roller Blind" oninput="calculateAll()"></div>
                    <div><label>Harga/m</label><input type="number" class="in-bl-h" placeholder="560000" oninput="calculateAll()"></div>
                </div>
                <div class="grid grid-2">
                    <div><label>Lebar</label><input type="number" step="0.01" class="in-bl-l" placeholder="1.5" oninput="calculateAll()"></div>
                    <div><label>Tinggi</label><input type="number" step="0.01" class="in-bl-t" placeholder="2.0" oninput="calculateAll()"></div>
                </div>
            </div>
            <div style="text-align:right; margin-top:8px; color:var(--success); font-weight:900;" class="sub-total">Rp 0</div>
        </div>
    </template>

    <script>
        let currentMode = 'lo';
        const P = { smokring: 4500, rollet: 65000, rell: 50000, hook: 40000, tali: 38000, stick: 50000, jahit: 20000, instal: 50000 };

        window.onload = () => { setMode('lo'); loadSettings(); };

        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.dashboard button').forEach(b => b.style.background = 'var(--bg-card)');
            document.getElementById('btn-'+m).style.background = 'var(--accent)';
        }

        function toggleVit(sel) { sel.closest('.window-item').querySelector('.vit-box').classList.toggle('hidden', sel.value==='tidak'); calculateAll(); }
        function toggleSpiral(sel) {
            const el = sel.closest('.window-item');
            el.querySelector('.sp-qty').classList.toggle('hidden', sel.value!=='Spiral');
            el.querySelector('.sp-dim').classList.toggle('hidden', sel.value!=='Spiral');
            calculateAll();
        }

        function addWindow() {
            const clone = document.getElementById('tmp-win').content.cloneNode(true);
            const el = clone.querySelector('.window-item');
            el.dataset.mode = currentMode;
            if(currentMode==='bl'){ el.querySelector('.f-gorden').classList.add('hidden'); el.querySelector('.f-blinds').classList.remove('hidden'); }
            document.getElementById('window-container').appendChild(el);
        }

        function calculateAll() {
            let grand = 0; window.finalData = [];
            document.querySelectorAll('.window-item').forEach(el => {
                const mode = el.dataset.mode;
                let sub = 0, details = [], item = { name: el.querySelector('.win-name').value, mode: mode };

                if(mode==='bl'){
                    const l = parseFloat(el.querySelector('.in-bl-l').value)||0, t = parseFloat(el.querySelector('.in-bl-t').value)||0, h = parseFloat(el.querySelector('.in-bl-h').value)||0, n = el.querySelector('.in-bl-n').value||"Blinds";
                    sub = Math.max(l,1) * Math.max(t,1) * h;
                    item.desc = `${n.toUpperCase()} (${l}x${t})`;
                    details.push({ n: n, v: sub });
                } else {
                    const nk = el.querySelector('.in-nk').value||"Kain", hk = parseFloat(el.querySelector('.in-hk').value)||0, l = parseFloat(el.querySelector('.in-l').value)||0, t = parseFloat(el.querySelector('.in-t').value)||0, p = el.querySelector('.in-p').value, m = el.querySelector('.sel-m').value, useV = el.querySelector('.sel-v').value==='ya';
                    const mtrK = (mode==='lo') ? Math.ceil((l+0.2)/0.4)*(t+0.3) : (l+0.2)*3;
                    sub = (mtrK*hk) + (mtrK*P.jahit);
                    details.push({ n: `Bahan ${nk} (${mtrK.toFixed(1)}m)`, v: mtrK*hk }, { n: "Jahit Gorden", v: mtrK*P.jahit });
                    if(m==='Smokring'){ let s = Math.ceil(l*24); if(s%2!==0) s++; sub += (s*P.smokring) + (Math.max(l,1)*P.rollet); details.push({n:`Smokring (${s}pcs)`, v:s*P.smokring},{n:`Rollet (${Math.max(l,1)}m)`, v:Math.max(l,1)*P.rollet}); }
                    else if(m==='Spiral'){ sub += P.stick; details.push({n:"Stick Gorden", v:P.stick}); }
                    else { sub += Math.max(l,1)*P.rell; details.push({n:`Rell Gorden (${Math.max(l,1)}m)`, v:Math.max(l,1)*P.rell}); }
                    if(useV){
                        const nv = el.querySelector('.in-nv').value||"Vitrase", hv = parseFloat(el.querySelector('.in-hv').value)||0, vm = el.querySelector('.sel-vm').value;
                        let vl = l, vt = t, vq = (vm==='Spiral')?parseInt(el.querySelector('.in-vq').value)||1 : 1;
                        if(vm==='Spiral'){ vl=parseFloat(el.querySelector('.in-vl').value)||0; vt=parseFloat(el.querySelector('.in-vt').value)||0; }
                        const mtrV = (vl+0.2)*3; sub += (mtrV*hv*vq) + (mtrV*P.jahit*vq);
                        details.push({ n: `Bahan ${nv} (${mtrV.toFixed(1)}m x${vq})`, v: mtrV*hv*vq }, { n: `Jahit Vitrase`, v: mtrV*P.jahit*vq });
                        if(vm==='Spiral'){ sub+=(P.stick*vq); details.push({n:`Stick Vit (${vq} set)`, v:P.stick*vq}); }
                        else { sub+=Math.max(vl,1)*P.rell; details.push({n:`Rell Vit (${Math.max(vl,1)}m)`, v:Math.max(vl,1)*P.rell}); }
                        item.vitDesc = `${nv.toUpperCase()} (${vl}x${vt}) (${vm.toUpperCase()}) (Qty:${vq})`;
                    }
                    if(m!=='Spiral'){ sub+=P.hook+P.tali+P.instal; details.push({n:"Hook & Tali", v:P.hook+P.tali},{n:"Instalasi", v:P.instal}); }
                    else { sub+=P.instal; details.push({n:"Instalasi", v:P.instal}); }
                    item.desc = `${nk.toUpperCase()} (${l}x${t}) (${m.toUpperCase()}) (${p} Pnl)`;
                }
                el.querySelector('.sub-total').innerText = "Rp " + Math.round(sub).toLocaleString('id-ID');
                item.total = sub; item.details = details; finalData.push(item); grand += sub;
            });
            document.getElementById('grand-total').innerText = "TOTAL: Rp " + Math.round(grand).toLocaleString('id-ID');
        }

        function prepReport(m) { document.getElementById('modal-cust').style.display='flex'; document.getElementById('btn-go').onclick = () => showReport(m); }

        function showReport(mode) {
            document.getElementById('modal-cust').style.display='none';
            const sName = localStorage.getItem('y_name') || "YENY GORDEN";
            const sWa = localStorage.getItem('y_wa') || "";
            const sLogo = localStorage.getItem('y_logo') || "";
            
            const now = new Date();
            const tglCetak = now.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
            let dateHtml = `Tanggal Cetak: ${tglCetak}`;
            
            if(mode==='estimasi'){
                const exp = new Date(); exp.setDate(now.getDate() + 7);
                dateHtml += `<br>Berlaku S/D: ${exp.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}`;
            }

            document.getElementById('rep-branding').innerHTML = `
                <div class="rep-header-box">
                    <img src="${sLogo}" class="rep-logo" onerror="this.style.display='none'">
                    <div class="rep-store-info">
                        <h2>${sName}</h2>
                        <p>WA: ${sWa}</p>
                    </div>
                </div>
                <h4 style="text-align:center; margin:5px 0; text-transform:uppercase;">${mode.toUpperCase()}</h4>
            `;
            document.getElementById('rep-date-area').innerHTML = dateHtml;
            
            const n = document.getElementById('c-name').value||"-", p = document.getElementById('c-phone').value||"-", a = document.getElementById('c-addr').value||"-";
            document.getElementById('rep-cust-info').innerHTML = (mode==='spk') ? `<b>Pesanan:</b> ${n} (${p})<br><b>Alamat:</b> ${a}` : `<b>Konsumen:</b> ${n} (${p})<br><b>Alamat:</b> ${a}`;

            const list = document.getElementById('rep-list'); list.innerHTML = "";
            finalData.forEach(item => {
                let html = `<div class="rep-item"><b>${item.name}</b><div>${item.desc}</div>`;
                if(item.vitDesc) html += `<div>${item.vitDesc}</div>`;
                if(mode==='estimasi') html += `<div style="text-align:right; font-weight:bold; margin-top:5px; border-top:1px solid #eee;">Total/set: Rp ${Math.round(item.total).toLocaleString('id-ID')}</div>`;
                if(mode==='rincian'){
                    html += `<table class="rincian-table" style="margin-top:5px;">`;
                    item.details.forEach(d => { html += `<tr><td>${d.n}</td><td style="text-align:right">Rp ${Math.round(d.v).toLocaleString('id-ID')}</td></tr>`; });
                    html += `</table>`;
                }
                list.innerHTML += html + `</div>`;
            });

            document.getElementById('rep-footer').innerHTML = (mode!=='spk') ? `<h3 style="text-align:right; border-top:2px solid #000; padding-top:10px;">Grand Total: ${document.getElementById('grand-total').innerText}</h3>` : "";
            document.getElementById('modal-report').style.display='block';
        }

        function openSettings() { document.getElementById('modal-settings').style.display='flex'; }
        function saveSettings() {
            localStorage.setItem('y_name', document.getElementById('set-name').value);
            localStorage.setItem('y_wa', document.getElementById('set-wa').value);
            document.getElementById('display-store-name').innerText = document.getElementById('set-name').value;
            document.getElementById('modal-settings').style.display='none';
        }
        function uploadLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => localStorage.setItem('y_logo', e.target.result);
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
