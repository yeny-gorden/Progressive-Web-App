<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Gorden Pro - Yeny Gorden</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #020617;
            --text-main: #f1f5f9;
            --text-dim: #eab308;
            --accent: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 10px 10px 160px 10px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .config-box { background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .logo-preview-dash { width: 60px; height: 60px; border: 1px dashed var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: var(--bg-input); }
        .logo-preview-dash img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .window-item { background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; border-left: 5px solid var(--accent); }
        .window-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .window-title-input { background: transparent; border: none; color: var(--accent); font-weight: bold; font-size: 16px; width: 100%; outline: none; border-bottom: 1px dashed #334155; }
        
        .grid-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 15px; align-items: end; }
        label { font-size: 10px; font-weight: bold; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        input, select { width: 100%; background: var(--bg-input); border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 13px; outline: none; }
        input[type="number"] { text-align: center; font-weight: bold; }

        .section-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid #334155; }
        .hidden { display: none !important; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-add { background: var(--accent); color: white; grid-column: span 2; font-size: 15px; }
        .btn-estimasi { background: #8b5cf6; color: white; }
        .btn-spk { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; border-radius: 50%; width: 28px; height: 28px; position: absolute; top: -10px; right: -10px; cursor: pointer; border: none; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #020617; padding: 15px; border-top: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
        .grand-total { color: var(--success); font-size: 24px; font-weight: bold; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; overflow-y: auto; }
        #print-area { background: #fff; color: #000; padding: 40px; width: 100%; max-width: 800px; margin: 0 auto; min-height: 100%; border-radius: 4px; }
        .pdf-row { border-bottom: 1px solid #eee; padding: 10px 0; color: #000; }
        
        /* PDF Header Styles */
        .pdf-header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; border-bottom: 3px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
        .shop-info h1 { margin: 0; color: #000; font-size: 24px; font-weight: 800; letter-spacing: 1px; }
        .shop-info p { margin: 2px 0; font-size: 14px; font-weight: 600; color: #334155; }
        .doc-info { text-align: right; }
        .doc-info h2 { margin: 0; text-transform: uppercase; font-size: 18px; color: #3b82f6; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px;">YENY GORDEN</h2>
        
        <div class="config-box">
            <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 15px;">
                <div class="logo-preview-dash" id="dash-logo-container">
                    <span style="font-size: 8px; color: #64748b;">NO LOGO</span>
                </div>
                <div style="flex: 1;">
                    <label>Upload Logo (Tampil di PDF)</label>
                    <input type="file" id="logo-input" accept="image/*" onchange="loadLogo(event)">
                </div>
            </div>

            <div class="grid-row">
                <div><label>Nama Pembeli</label><input type="text" id="cust-nama" placeholder="Nama" oninput="saveCustomer()"></div>
                <div><label>Alamat</label><input type="text" id="cust-alamat" placeholder="Alamat" oninput="saveCustomer()"></div>
                <div><label>Telepon</label><input type="number" id="cust-telp" placeholder="Nomor WA" oninput="saveCustomer()"></div>
            </div>
        </div>

        <div id="window-list"></div>

        <div class="btn-group">
            <button class="btn btn-add" onclick="addWindow()">+ TAMBAH JENDELA BARU</button>
            <button class="btn btn-estimasi" onclick="openPreview('estimasi')">📄 CETAK ESTIMASI</button>
            <button class="btn btn-spk" onclick="openPreview('spk')">🛠️ CETAK SPK BAHAN</button>
        </div>
    </div>

    <div class="footer">
        <div>
            <label style="margin:0;">Diskon (Rp):</label>
            <input type="number" id="d-val" style="width: 100px;" value="0" oninput="calculateAll()">
        </div>
        <div id="grand-total" class="grand-total">Rp 0</div>
    </div>

    <div id="modal-cetak" class="modal">
        <div style="text-align:center; margin-bottom: 15px;">
            <button onclick="closeModal()" style="padding:10px 20px; background:var(--danger); color:white; border:none; border-radius:5px; cursor:pointer;">KEMBALI</button>
            <button id="download-btn" style="padding:10px 30px; background:var(--success); color:white; border:none; border-radius:5px; cursor:pointer; font-weight: bold; margin-left:10px;">💾 DOWNLOAD PDF</button>
        </div>
        <div id="print-area">
            <div class="pdf-header-grid">
                <div class="shop-info">
                    <div id="pdf-logo-wrap" style="margin-bottom: 8px;"></div>
                    <h1>YENY GORDEN</h1>
                    <p>📞 089504215020</p>
                </div>
                <div class="doc-info">
                    <h2 id="pdf-title"></h2>
                    <p id="pdf-date" style="font-size:13px; margin:5px 0; font-weight: bold;"></p>
                    <p id="pdf-exp" style="font-size: 12px; font-weight: bold; color: #dc2626; margin: 0;"></p>
                </div>
            </div>
            
            <div id="pdf-buyer" style="font-size:14px; margin-bottom:20px; line-height:1.4; color: #000; background: #f1f5f9; padding: 12px; border-radius: 5px; border: 1px solid #cbd5e1;"></div>
            
            <div id="pdf-content"></div>
            
            <div id="pdf-total" style="text-align:right; border-top:2px solid #000; padding-top:10px; margin-top:20px; font-size:20px; font-weight:bold; color: #000;"></div>
        </div>
    </div>

    <template id="tmp-win">
        <div class="window-item">
            <button class="btn-del" onclick="this.parentElement.remove(); calculateAll();">×</button>
            <div class="window-header"><input type="text" class="window-title-input" placeholder="Nama Ruangan/Jendela" ></div>
            
            <div class="grid-row">
                <div><label>LEBAR (m)</label><input type="number" placeholder="1.5" step="0.01" class="w-l" oninput="calculateAll()"></div>
                <div><label>TINGGI (m)</label><input type="number" placeholder="2.5" step="0.01" class="w-t" oninput="calculateAll()"></div>
                <div><label>Bahan</label>
                    <select class="w-jn" onchange="calculateAll()">
                        <option value="import">IMPORT</option>
                        <option value="lokal">LOKAL</option>
                    </select>
                </div>
                <div><label>Model</label>
                    <select class="w-m" onchange="toggleModel(this)">
                        <option value="Smokring">Smokring</option>
                        <option value="Plisket">Plisket</option>
                        <option value="Spiral">Spiral</option>
                    </select>
                </div>
            </div>

            <div class="section-box">
                <div class="grid-row">
                    <div><label>Nama Kain</label><input type="text" class="w-nk" placeholder="Nama Kain" oninput="calculateAll()"></div>
                    <div><label>Harga Kain</label><input type="number" placeholder="150000" class="w-hk" oninput="calculateAll()"></div>
                    <div class="panel-field"><label>Panel</label><input type="number" class="w-panel" value="1" oninput="calculateAll()"></div>
                </div>

                <div class="vit-field" style="margin-top:10px; border-top: 1px solid #334155; padding-top:10px;">
                    <label>Tambahan Vitrase</label>
                    <select class="w-v" onchange="toggleVit(this)">
                        <option value="none">Tanpa Vitrase</option>
                        <option value="Plisket">Vitrase Plisket</option>
                        <option value="Spiral">Vitrase Spiral</option>
                    </select>

                    <div class="v-spiral-box hidden" style="margin-top:10px; background: rgba(59, 130, 246, 0.1); padding: 10px; border-radius: 5px;">
                        <div class="grid-row" style="margin-bottom:0;">
                            <div><label>Nama Vitras</label><input type="text" placeholder="Warna" class="w-nv" oninput="calculateAll()"></div>
                            <div><label>Harga Vitras</label><input type="number" placeholder="100000" class="w-hv" oninput="calculateAll()"></div>
                            <div><label>L Kaca</label><input type="number" placeholder="0.5" step="0.01" class="v-sl" oninput="calculateAll()"></div>
                            <div><label>T Kaca</label><input type="number" placeholder="1.6" step="0.01" class="v-st" oninput="calculateAll()"></div>
                            <div><label>Qty Stick</label><input type="number" class="v-sq" value="1" oninput="calculateAll()"></div>
                        </div>
                    </div>
                    
                    <div class="v-plisket-box hidden" style="margin-top:10px;">
                        <div class="grid-row">
                            <div><label>Nama Vitras</label><input type="text" placeholder="Warna" class="w-nv-p" oninput="calculateAll()"></div>
                            <div><label>Harga Vitras</label><input type="number" placeholder="100000" class="w-hv-p" oninput="calculateAll()"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div style="text-align:right; margin-top:10px;"><span class="w-sub" style="color:var(--success); font-weight:bold; font-size:18px;">Rp 0</span></div>
        </div>
    </template>

    <script>
        // Data Harga Default
        const HARGA = { smokring: 4500, rollet: 65000, rell: 50000, stick: 50000, hook: 40000, tali: 38000, jahit: 20000, instal: 50000 };
        let allData = [];
        let logoDataURL = "";

        window.onload = () => {
            document.getElementById('cust-nama').value = localStorage.getItem('yeny_nama') || '';
            document.getElementById('cust-alamat').value = localStorage.getItem('yeny_alamat') || '';
            document.getElementById('cust-telp').value = localStorage.getItem('yeny_telp') || '';
            addWindow();
        };

        function loadLogo(event) {
            const reader = new FileReader();
            reader.onload = function() {
                logoDataURL = reader.result;
                document.getElementById('dash-logo-container').innerHTML = `<img src="${logoDataURL}">`;
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function saveCustomer() {
            localStorage.setItem('yeny_nama', document.getElementById('cust-nama').value);
            localStorage.setItem('yeny_alamat', document.getElementById('cust-alamat').value);
            localStorage.setItem('yeny_telp', document.getElementById('cust-telp').value);
        }

        function addWindow() {
            const list = document.getElementById('window-list');
            const clone = document.getElementById('tmp-win').content.cloneNode(true);
            list.appendChild(clone);
            calculateAll();
        }

        function toggleModel(el) {
            const win = el.closest('.window-item');
            win.querySelector('.panel-field').classList.toggle('hidden', el.value === 'Spiral');
            win.querySelector('.vit-field').classList.toggle('hidden', el.value === 'Spiral');
            calculateAll();
        }

        function toggleVit(el) {
            const win = el.closest('.window-item');
            win.querySelector('.v-spiral-box').classList.toggle('hidden', el.value !== 'Spiral');
            win.querySelector('.v-plisket-box').classList.toggle('hidden', el.value !== 'Plisket');
            calculateAll();
        }

        function calculateAll() {
            const items = document.querySelectorAll('.window-item');
            let grandTotal = 0;
            allData = [];

            items.forEach((win, i) => {
                const l = parseFloat(win.querySelector('.w-l').value) || 0;
                const t = parseFloat(win.querySelector('.w-t').value) || 0;
                const jn = win.querySelector('.w-jn').value;
                const m = win.querySelector('.w-m').value;
                const panel = win.querySelector('.w-panel').value || 1;
                const title = win.querySelector('.window-title-input').value || `Jendela ${i+1}`;
                
                let sub = 0;
                let data = { title, l, t, m, panel, nk:"", hk:0, nv:"", hv:0, sub:0, isSpiralVit: false, vsq: 0 };
                const hk = parseFloat(win.querySelector('.w-hk').value) || 0;
                data.nk = win.querySelector('.w-nk').value || "Kain";

                let pk = (jn === 'import') ? (l + 0.2) * 3 : Math.ceil((l + 0.2) / 0.4) * (t + 0.3);
                sub += (pk * hk) + (pk * HARGA.jahit);

                if(m === 'Smokring') {
                    let ring = Math.ceil(l * 24); if(ring % 2 !== 0) ring++;
                    sub += (ring * HARGA.smokring) + (Math.max(l,1) * HARGA.rollet) + (HARGA.hook + HARGA.tali);
                } else if(m === 'Spiral') {
                    sub += (1 * HARGA.stick);
                } else {
                    sub += (Math.max(l,1) * HARGA.rell) + (HARGA.hook + HARGA.tali);
                }
                sub += HARGA.instal;

                const vMode = win.querySelector('.w-v').value;
                if(m !== 'Spiral' && vMode !== 'none') {
                    if(vMode === 'Spiral') {
                        const vl = parseFloat(win.querySelector('.v-sl').value) || l;
                        const vsq = parseInt(win.querySelector('.v-sq').value) || 1;
                        const hv = parseFloat(win.querySelector('.w-hv').value) || 0;
                        let pv = (vl + 0.2) * 3 * vsq;
                        sub += (pv * hv) + (pv * HARGA.jahit) + (vsq * HARGA.stick);
                        data.nv = win.querySelector('.w-nv').value || "Vitras Spiral";
                        data.isSpiralVit = true; data.vsq = vsq;
                    } else {
                        const hv = parseFloat(win.querySelector('.w-hv-p').value) || 0;
                        let pv = (l + 0.2) * 3;
                        sub += (pv * hv) + (pv * HARGA.jahit) + (Math.max(l,1) * HARGA.rell);
                        data.nv = win.querySelector('.w-nv-p').value || "Vitras Plisket";
                    }
                }
                win.querySelector('.w-sub').innerText = "Rp " + Math.round(sub).toLocaleString('id-ID');
                data.sub = sub; grandTotal += sub; allData.push(data);
            });

            const dVal = parseFloat(document.getElementById('d-val').value) || 0;
            const final = grandTotal - dVal;
            document.getElementById('grand-total').innerText = "Rp " + Math.round(final).toLocaleString('id-ID');
        }

        function openPreview(type) {
            calculateAll();
            const modal = document.getElementById('modal-cetak');
            const today = new Date();
            
            // Tampilkan Logo di PDF jika ada
            const logoWrap = document.getElementById('pdf-logo-wrap');
            logoWrap.innerHTML = logoDataURL ? `<img src="${logoDataURL}" style="max-height:60px;">` : "";

            document.getElementById('pdf-title').innerText = type === 'estimasi' ? "ESTIMASI PENAWARAN" : "SPK (PERINTAH KERJA)";
            document.getElementById('pdf-date').innerText = "Tanggal: " + today.toLocaleDateString('id-ID');
            
            const expEl = document.getElementById('pdf-exp');
            if (type === 'estimasi') {
                const expDate = new Date(); expDate.setDate(today.getDate() + 7);
                expEl.innerText = "Berlaku s/d: " + expDate.toLocaleDateString('id-ID');
                expEl.style.display = "block";
            } else {
                expEl.style.display = "none";
            }
            
            document.getElementById('pdf-buyer').innerHTML = `
                Nama: <strong>${document.getElementById('cust-nama').value || '-'}</strong><br>
                Alamat: ${document.getElementById('cust-alamat').value || '-'}<br>
                Telp: ${document.getElementById('cust-telp').value || '-'}
            `;

            let content = "";
            allData.forEach(d => {
                content += `
                <div class="pdf-row">
                    <div style="font-weight:bold; color: #000; font-size: 14px; margin-bottom: 4px;">${d.title.toUpperCase()}</div>
                    <div style="font-size:13px; color: #334155; line-height: 1.5;">
                        Gorden: ${d.nk} (${d.l}x${d.t}m) - Model: ${d.m} ${d.m !== 'Spiral' ? '['+d.panel+' Panel]' : ''}
                        ${d.nv ? `<br>Vitras: ${d.nv} ${d.isSpiralVit ? '(Spiral '+d.vsq+' set)' : '[Plisket]'}` : ''}
                    </div>
                    ${type === 'estimasi' ? `<div style="text-align:right; font-weight:bold; color: #000; font-size: 14px; margin-top:5px;">Subtotal: Rp ${Math.round(d.sub).toLocaleString('id-ID')}</div>` : ''}
                </div>`;
            });
            document.getElementById('pdf-content').innerHTML = content;
            document.getElementById('pdf-total').innerText = type === 'estimasi' ? "GRAND TOTAL: " + document.getElementById('grand-total').innerText : "";
            
            modal.style.display = "block";

            document.getElementById('download-btn').onclick = () => {
                const element = document.getElementById('print-area');
                const namaCust = document.getElementById('cust-nama').value.toUpperCase().replace(/\s+/g, '_') || 'PELANGGAN';
                const kode = type === 'estimasi' ? 'EST' : 'SPK';
                
                window.scrollTo(0,0);
                html2pdf().set({
                    margin: [0.5, 0.5],
                    filename: `${kode}_${namaCust}.pdf`,
                    html2canvas: { scale: 2, scrollY: 0, useCORS: true },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                }).from(element).save();
            };
        }

        function closeModal() { document.getElementById('modal-cetak').style.display = "none"; }
    </script>
</body>
</html>
