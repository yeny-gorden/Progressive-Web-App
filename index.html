<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="app-title">Kalkulator Yeny Gorden Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root {
            --bg-body: #0f172a; --bg-card: #1e293b; --bg-input: #020617;
            --text-main: #ffffff; --text-dim: #fbbf24; --accent: #3b82f6;
            --success: #22c55e; --danger: #ef4444; --border: #475569;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Arial', sans-serif; margin: 0; padding: 10px; }
        
        .container { max-width: 900px; margin: 0 auto; }
        .global-card, .footer-card { background: #020617; padding: 15px; border-radius: 12px; border: 2px solid var(--border); margin-bottom: 15px; }
        .window-item { background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; border-left: 8px solid var(--accent); transition: all 0.3s ease; }
        
        .win-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        .win-name-input { 
            background: transparent; border: none; color: #fff; 
            font-weight: 900; font-size: 14px; text-transform: uppercase;
            width: 80%; outline: none; border-bottom: 1px dashed transparent;
        }
        .win-name-input:focus { border-bottom-color: var(--accent); color: var(--text-dim); }

        .grid { display: grid; gap: 10px; margin-bottom: 10px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        
        label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 4px; text-align: center; }
        
        input, select, textarea { 
            width: 100%; background: var(--bg-input); border: 2px solid var(--border); 
            color: white; padding: 10px; border-radius: 8px; font-size: 14px; 
            font-weight: 700; text-align: center; 
        }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-add { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-size: 15px; cursor: pointer; margin-bottom: 20px; }
        .btn-del { background: var(--danger); color: white; border: 2px solid white; width: 28px; height: 28px; border-radius: 50%; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .grand-total { color: var(--success); font-size: 24px; font-weight: 900; text-align: center; margin: 10px 0; }
        .hidden { display: none !important; }

        /* Modal & Print */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 10px; overflow-y: auto; }
        .modal-content { background: #fff; color: #000; max-width: 800px; margin: 0 auto; padding: 20px; border-radius: 15px; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 15px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-right { text-align: left; font-size: 13px; font-weight: 700; color: #000; line-height: 1.4; min-width: 220px; }
        #app-logo-print { width: 90px; height: 90px; object-fit: contain; }
        .header-info h2 { margin: 0; font-size: 22px; font-weight: 900; color: #000; }
        .header-info p { margin: 1px 0; font-weight: 700; font-size: 13px; color: #000; }
        
        .item-box { border: 2px solid #000; padding: 12px; margin-bottom: 10px; font-family: 'Arial', sans-serif; font-size: 14px; color: #000; line-height: 1.4; }
        .item-box b { font-size: 15px; text-transform: uppercase; border-bottom: 1px solid #ddd; display: block; margin-bottom: 5px; }

        @media print {
            .no-print, #modal-input-customer { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .modal { position: absolute !important; display: block !important; padding: 0 !important; top: 0; left: 0; background: white !important; overflow: visible !important; }
            .modal-content { border: none !important; width: 100% !important; margin: 0 !important; padding: 0 !important; border-radius: 0 !important; }
            #printable-area { padding-top: 0 !important; }
        }
    </style>
</head>
<body>

    <div class="container no-print">
        <div class="global-card">
            <h2 style="margin:0; text-align:center; color:var(--accent); font-weight: 900; letter-spacing: 2px;">YENY GORDEN</h2>
            <div style="margin-top: 10px;">
                <label>Upload Logo Toko</label>
                <input type="file" id="cfg-logo" accept="image/*" onchange="uploadLogo(this)">
            </div>
        </div>

        <div class="global-card">
            <div class="grid grid-2">
                <div>
                    <label>Nama Kain</label>
                    <input type="text" id="global-nama-kain" placeholder="Nama Kain" oninput="calculateAll()">
                    <label style="margin-top:5px;">Harga Kain (Rp/m)</label>
                    <input type="number" id="global-harga-kain" placeholder="0" oninput="calculateAll()">
                </div>
                <div>
                    <label>Nama Vitrase</label>
                    <input type="text" id="global-nama-vitrase" placeholder="Nama Vitrase" oninput="calculateAll()">
                    <label style="margin-top:5px;">Harga Vitrase (Rp/m)</label>
                    <input type="number" id="global-harga-vitrase" placeholder="0" oninput="calculateAll()">
                </div>
            </div>
        </div>

        <div id="window-container"></div>
        <button class="btn-add" onclick="addWindow()">+ TAMBAH JENDELA</button>

        <div class="footer-card">
            <div id="grand-total" class="grand-total">TOTAL: Rp 0</div>
            <div class="grid grid-3">
                <button onclick="showMode('estimasi')" style="padding: 15px 2px; background: #8b5cf6; color: #fff; border: none; font-size: 11px; cursor:pointer; font-weight: 900; border-radius: 8px;">ESTIMASI</button>
                <button onclick="showMode('spk')" style="padding: 15px 2px; background: var(--success); color: #fff; border: none; font-size: 11px; cursor:pointer; font-weight: 900; border-radius: 8px;">SPK / SJ</button>
                <button onclick="showMode('rincian')" style="padding: 15px 2px; background: #f97316; color: #fff; border: none; font-size: 11px; cursor:pointer; font-weight: 900; border-radius: 8px;">RINCIAN</button>
            </div>
        </div>
    </div>

    <div id="modal-input-customer" class="modal">
        <div class="modal-content" style="max-width: 400px; margin-top: 50px;">
            <h3 style="text-align:center; color:#000; margin-bottom: 20px;">Data Pelanggan</h3>
            <div style="margin-bottom:12px;">
                <label style="color:#000; text-align:left;">Nama Pelanggan</label>
                <input type="text" id="cust-name" placeholder="Bp. Kaswad" style="color:#000; border:2px solid #ddd; background:#fff;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="color:#000; text-align:left;">Nomor HP / WhatsApp</label>
                <input type="number" id="cust-phone" placeholder="08123456789" style="color:#000; border:2px solid #ddd; background:#fff;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="color:#000; text-align:left;">Alamat</label>
                <textarea id="cust-address" rows="3" placeholder="Jl. Indonesia Gelap No.3" style="color:#000; border:2px solid #ddd; background:#fff; width:100%; border-radius:8px; padding:10px; font-weight:700;"></textarea>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button id="btn-confirm-print" style="background:var(--success); color:#fff; padding:15px; border:none; font-weight:900; border-radius:8px; cursor:pointer;">PROSES</button>
                <button onclick="closeInputModal()" style="background:var(--danger); color:white; padding:15px; border:none; font-weight:900; border-radius:8px; cursor:pointer;">BATAL</button>
            </div>
        </div>
    </div>

    <div id="modal-detail" class="modal">
        <div class="modal-content" id="printable-area">
            <div id="dynamic-header-container"></div>
            <div id="modal-list"></div>
            <div id="p-total-container" style="margin-top:15px; text-align:right; border-top:4px solid #000; padding-top:10px;">
                <h3 id="p-total" style="font-size: 22px; font-weight: 900; margin:0;"></h3>
            </div>
            <div class="no-print" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
                <button onclick="window.print()" style="background:#000; color:#fff; padding:15px; border:none; font-weight:900; border-radius:8px; cursor:pointer;">CETAK / PDF</button>
                <button onclick="closeModal()" style="background:var(--danger); color:white; padding:15px; border:none; font-weight:900; border-radius:8px; cursor:pointer;">TUTUP</button>
            </div>
        </div>
    </div>

    <template id="win-tmp">
        <div class="window-item">
            <div class="win-header">
                <input type="text" class="win-name-input" value="" placeholder="Nama Jendela..." oninput="calculateAll()">
                <button class="btn-del" onclick="removeWindow(this)">×</button>
            </div>
            <div class="grid grid-3">
                <div><label>Lebar (m)</label><input type="number" step="0.01" class="in-l" placeholder="0.00" oninput="calculateAll()"></div>
                <div><label>Tinggi (m)</label><input type="number" step="0.01" class="in-t" placeholder="0.00" oninput="calculateAll()"></div>
                <div><label>Panel</label><input type="number" class="in-p" placeholder="0" value="1" oninput="calculateAll()"></div>
            </div>
            <div class="grid grid-3">
                <div><label>Tipe/Model</label><select class="sel-m" onchange="handleM(this)"><option value="smokring">Smokring</option><option value="plisket">Plisket</option><option value="spiral">Spiral</option><option value="blinds">Blinds</option></select></div>
                <div class="std-f"><label>Pilih Kain</label><select class="sel-j" onchange="calculateAll()"><option value="im">Import</option><option value="lo">Lokal</option></select></div>
                <div><label>Pakai Vitrase?</label><select class="sel-v-toggle" onchange="togVit(this)"><option value="tidak">TIDAK</option><option value="ya">YA</option></select></div>
            </div>
            <div class="blinds-sec hidden">
                <div class="grid grid-2">
                    <div><label>Type Blinds</label><input type="text" class="in-bn" placeholder="Kode" oninput="calculateAll()"></div>
                    <div><label>Harga (Rp/m)</label><input type="number" class="in-bh" placeholder="0" oninput="calculateAll()"></div>
                </div>
            </div>
            <div class="vit-sec hidden" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-top:5px; border: 1px dashed var(--border);">
                <div class="grid grid-2">
                    <div><label>Model Vit</label><select class="sel-vm" onchange="handleVM(this)"><option value="plisket">Plisket</option><option value="spiral">Spiral</option></select></div>
                    <div class="v-spiral-input hidden"><label>Qty Set Vit</label><input type="number" class="in-vq" value="1" oninput="calculateAll()"></div>
                </div>
                <div class="v-spiral-input hidden" style="margin-top:5px;">
                    <div class="grid grid-2">
                        <div><label>L Vit (m)</label><input type="number" step="0.01" class="in-vl" placeholder="0.00" oninput="calculateAll()"></div>
                        <div><label>T Vit (m)</label><input type="number" step="0.01" class="in-vt" placeholder="0.00" oninput="calculateAll()"></div>
                    </div>
                </div>
            </div>
            <div style="text-align:right; margin-top:8px;"><span class="sub-txt" style="font-weight:900; color:var(--success); font-size:16px;">Rp 0</span></div>
        </div>
    </template>

    <script>
        const PR = { smokring: 4500, rollet: 65000, rell: 50000, hook: 40000, tali: 38000, stick: 50000, jahit: 20000, instal: 50000 };
        let allItems = [];
        const ORIGINAL_APP_TITLE = "Kalkulator Yeny Gorden Pro";

        function uploadLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { localStorage.setItem('y_logo_permanent', e.target.result); };
                reader.readAsDataURL(input.files[0]);
            }
        }

        window.onload = () => { addWindow(); };

        function addWindow() { 
            const container = document.getElementById('window-container');
            const clone = document.getElementById('win-tmp').content.cloneNode(true);
            container.appendChild(clone);
            reorderWindows();
            calculateAll(); 
        }

        function removeWindow(btn) {
            if(confirm("Hapus jendela ini?")) {
                btn.closest('.window-item').remove();
                reorderWindows();
                calculateAll();
            }
        }

        function reorderWindows() {
            const items = document.querySelectorAll('.window-item');
            items.forEach((item, index) => {
                const inputName = item.querySelector('.win-name-input');
                if (inputName.value === "" || inputName.value.startsWith("JENDELA #")) {
                    inputName.value = `JENDELA #${index + 1}`;
                }
            });
        }

        function handleM(el) {
            const win = el.closest('.window-item');
            const isB = el.value === 'blinds';
            win.querySelectorAll('.std-f').forEach(f => f.classList.toggle('hidden', el.value === 'spiral' || isB));
            win.querySelector('.blinds-sec').classList.toggle('hidden', !isB);
            if(el.value === 'spiral' || isB) win.querySelector('.sel-v-toggle').value = 'tidak';
            togVit(win.querySelector('.sel-v-toggle')); 
            calculateAll();
        }

        function togVit(el) { 
            const sec = el.closest('.window-item').querySelector('.vit-sec');
            sec.classList.toggle('hidden', el.value === 'tidak'); 
            calculateAll(); 
        }

        function handleVM(el) { 
            const vis = el.value === 'spiral';
            el.closest('.vit-sec').querySelectorAll('.v-spiral-input').forEach(i => i.classList.toggle('hidden', !vis));
            calculateAll(); 
        }

        function calculateAll() {
            let totalOverall = 0; allItems = [];
            const hK = parseFloat(document.getElementById('global-harga-kain').value) || 0;
            const hV = parseFloat(document.getElementById('global-harga-vitrase').value) || 0;
            const nK = document.getElementById('global-nama-kain').value || "-";
            const nV = document.getElementById('global-nama-vitrase').value || "-";

            document.querySelectorAll('.window-item').forEach((win, i) => {
                const customName = win.querySelector('.win-name-input').value;
                const L = parseFloat(win.querySelector('.in-l').value) || 0;
                const T = parseFloat(win.querySelector('.in-t').value) || 0;
                const Pan = win.querySelector('.in-p').value || 0;
                const M = win.querySelector('.sel-m').value;
                const isV = win.querySelector('.sel-v-toggle').value === 'ya';
                let subSet = 0; let details = [];

                if (M === 'blinds') {
                    const bN = win.querySelector('.in-bn').value || "BLINDS";
                    const bH = parseFloat(win.querySelector('.in-bh').value) || 0;
                    subSet = (L < 1 ? 1 : L) * (T < 1 ? 1 : T) * bH;
                    details.push({ n: bN.toUpperCase(), v: subSet });
                    allItems.push({ id: i+1, cName: customName, type: 'blind', subSet, spec: {l:L, t:T, bn: bN, key: `bl-${bN}-${L}-${T}`}, details });
                } else {
                    const J = win.querySelector('.sel-j').value;
                    const vModel = win.querySelector('.sel-vm').value;
                    const vL = parseFloat(win.querySelector('.in-vl').value) || 0;
                    const vT = parseFloat(win.querySelector('.in-vt').value) || 0;
                    const vQ = parseInt(win.querySelector('.in-vq').value) || 1;

                    const tK = (J === 'im') ? (L + 0.2) * 3 : Math.ceil((L + 0.2) / 0.4) * (T + 0.3);
                    const costK = tK * hK;
                    const costJ = tK * PR.jahit;
                    subSet += costK + costJ;
                    details.push({ n: `Bahan Kain (${tK.toFixed(2)}m)`, v: costK });
                    details.push({ n: `Jahit Kain`, v: costJ });

                    if (isV) {
                        let lD = (vModel === 'spiral') ? vL : L;
                        let tD = (vModel === 'spiral') ? vT : T;
                        let tV = (lD + 0.2) * 3;
                        let costVK = tV * hV * vQ;
                        let costVJ = tV * PR.jahit * vQ;
                        subSet += costVK + costVJ;
                        details.push({ n: `Bahan Vitrase (${tV.toFixed(2)}m x ${vQ})`, v: costVK });
                        details.push({ n: `Jahit Vitrase`, v: costVJ });
                        if (vModel === 'spiral') {
                            subSet += (PR.stick * vQ);
                            details.push({ n: `Stick Vitrase (${vQ} set)`, v: PR.stick * vQ });
                        } else {
                            subSet += (Math.max(lD, 1) * PR.rell);
                            details.push({ n: `Rell Vitrase (${Math.max(lD,1)}m)`, v: Math.max(lD,1) * PR.rell });
                        }
                    }
                    
                    if (M === 'smokring') {
                        let smok = Math.ceil(L * 24); if(smok % 2 !== 0) smok++; 
                        subSet += (smok * PR.smokring) + (Math.max(L,1) * PR.rollet);
                        details.push({ n: `Smokring (${smok} pcs)`, v: smok * PR.smokring });
                        details.push({ n: `Rollet (${Math.max(L,1)}m)`, v: Math.max(L,1) * PR.rollet });
                    } else if (M === 'spiral') {
                        subSet += PR.stick;
                        details.push({ n: `Stick Gorden`, v: PR.stick });
                    } else {
                        subSet += Math.max(L,1) * PR.rell;
                        details.push({ n: `Rell Gorden`, v: Math.max(L,1) * PR.rell });
                    }
                    
                    if(M !== 'spiral') {
                        subSet += PR.hook + PR.tali + PR.instal;
                        details.push({ n: `Hook`, v: PR.hook });
                        details.push({ n: `Tali`, v: PR.tali });
                        details.push({ n: `Instalasi`, v: PR.instal });
                    }

                    allItems.push({ 
                        id: i+1, cName: customName, type: 'gorden', subSet, 
                        spec: {l:L, t:T, nk:nK, nv:isV?nV:'-', m:M, p:Pan, vm:vModel, vl:vL, vt:vT, vq:vQ, isV, key: `${nK}-${L}-${T}-${M}-${Pan}-${isV?vModel:'no'}`}, 
                        details 
                    });
                }
                win.querySelector('.sub-txt').innerText = "Rp " + Math.round(subSet).toLocaleString('id-ID');
                totalOverall += subSet;
            });
            document.getElementById('grand-total').innerText = "TOTAL: Rp " + Math.round(totalOverall).toLocaleString('id-ID');
        }

        function formatGroupNames(names) {
            const prefixMap = {};
            names.forEach(name => {
                const match = name.match(/^(.*?)\s*#?(\d+)$/);
                if (match) {
                    const base = match[1].trim();
                    const num = match[2];
                    if (!prefixMap[base]) prefixMap[base] = [];
                    prefixMap[base].push(num);
                } else {
                    if (!prefixMap[name]) prefixMap[name] = [];
                }
            });
            let results = [];
            for (let base in prefixMap) {
                if (prefixMap[base].length > 0) {
                    results.push(`${base} ${prefixMap[base].join(", ")}`);
                } else {
                    results.push(base);
                }
            }
            return results.join(" | ");
        }

        function showMode(mode) {
            if(mode === 'rincian') { 
                document.title = "Rincian Kalkulasi";
                generateReport(mode, "-", "-", "-"); 
                return; 
            }
            document.getElementById('modal-input-customer').style.display = "block";
            document.getElementById('btn-confirm-print').onclick = () => {
                const name = document.getElementById('cust-name').value || "-";
                const phone = document.getElementById('cust-phone').value || "";
                const addr = document.getElementById('cust-address').value || "-";
                
                // LANGSUNG GANTI JUDUL HALAMAN DI SINI
                let prefix = (mode === 'estimasi') ? 'Est' : 'Spk';
                let cleanName = name.replace(/[/\\?%*:|"<>]/g, '');
                let cleanPhone = phone.replace(/[/\\?%*:|"<>]/g, '');
                
                // INI YANG MEMAKSA NAMA FILE PDF BERUBAH
                document.title = `${prefix} ${cleanName} ${cleanPhone}`.trim();

                generateReport(mode, name, phone, addr);
                closeInputModal();
            };
        }

        function generateReport(mode, cName, cPhone, cAddr) {
            const list = document.getElementById('modal-list'); list.innerHTML = "";
            const headerBox = document.getElementById('dynamic-header-container');
            const now = new Date();
            const savedLogo = localStorage.getItem('y_logo_permanent') || '';
            const labelCust = (mode === 'spk') ? 'Pesanan' : 'Penerima';

            headerBox.innerHTML = `
                <div class="header-flex">
                    <div class="header-left">
                        <img src="${savedLogo}" id="app-logo-print" alt="Logo">
                        <div class="header-info">
                            <h2>YENY GORDEN</h2>
                            <p>WhatsApp: 0895-0421-5020</p>
                            <p>Tgl: ${now.toLocaleDateString('id-ID')}</p>
                        </div>
                    </div>
                    <div class="header-right">
                        <div style="border: 2px solid #000; padding: 8px; border-radius: 8px;">
                            <b>${labelCust}:</b> ${cName} (${cPhone})<br>
                            <b>Alamat:</b> ${cAddr}
                        </div>
                        ${mode === 'estimasi' ? `<p style="margin-top:5px; font-size:11px;">Valid s/d: ${new Date(now.getTime() + 7*24*60*60*1000).toLocaleDateString('id-ID')}</p>` : ''}
                    </div>
                </div>
                <h3 style="text-align:center; text-decoration:underline; font-size: 18px; margin-bottom:15px; margin-top:0;">
                    ${mode.toUpperCase()} ${mode==='spk'?'(SURAT KERJA)':''}
                </h3>
            `;

            document.getElementById('p-total-container').style.display = (mode==='spk') ? 'none' : 'block';

            if (mode === 'rincian') {
                allItems.forEach(w => {
                    let html = `<div class="item-box"><b>${w.cName}</b><br>`;
                    w.details.forEach(d => html += `<div style="display:flex; justify-content:space-between; font-size:12px;"><span>${d.n}</span><span>Rp ${Math.round(d.v).toLocaleString('id-ID')}</span></div>`);
                    html += `<div style="text-align:right; font-weight:bold; border-top:1px solid #ddd; margin-top:5px;">Total: Rp ${Math.round(w.subSet).toLocaleString('id-ID')}</div></div>`;
                    list.innerHTML += html;
                });
            } else {
                const groups = {};
                allItems.forEach(item => {
                    if (!groups[item.spec.key]) groups[item.spec.key] = { names: [], data: item, count: 0, totalSub: 0, pricePerSet: item.subSet };
                    groups[item.spec.key].names.push(item.cName);
                    groups[item.spec.key].count++;
                    groups[item.spec.key].totalSub += item.subSet;
                });

                for (let key in groups) {
                    const g = groups[key]; const d = g.data;
                    const groupTitle = formatGroupNames(g.names);
                    let html = `<div class="item-box"><b>${groupTitle} (${g.count} Set)</b><br>`;
                    if(d.type === 'gorden') {
                        html += `• ${d.spec.nk.toUpperCase()} (${d.spec.l}x${d.spec.t}) - ${d.spec.m.toUpperCase()} (${d.spec.p} PNL)<br>`;
                        if(d.spec.isV) {
                            let ukVit = (d.spec.vm === 'plisket') ? `${d.spec.l}x${d.spec.t}` : `${d.spec.vl}x${d.spec.vt} (Qty:${d.spec.vq})`;
                            html += `• VIT: ${d.spec.nv.toUpperCase()} (${ukVit}) - ${d.spec.vm.toUpperCase()}<br>`;
                        }
                    } else { html += `• ${d.spec.bn.toUpperCase()} (${d.spec.l}x${d.spec.t})`; }
                    
                    if(mode === 'estimasi') {
                        html += `<div style="display:flex; justify-content:space-between; margin-top:8px; font-size:13px; border-top:1px dashed #ccc; padding-top:4px;">
                                    <span>Harga @ Rp ${Math.round(g.pricePerSet).toLocaleString('id-ID')}</span>
                                    <span style="font-weight:900;">Sub: Rp ${Math.round(g.totalSub).toLocaleString('id-ID')}</span>
                                 </div>`;
                    }
                    list.innerHTML += html + `</div>`;
                }
            }
            document.getElementById('p-total').innerText = document.getElementById('grand-total').innerText;
            document.getElementById('modal-detail').style.display = "block";
        }

        function closeInputModal() { document.getElementById('modal-input-customer').style.display = "none"; }
        
        function closeModal() { 
            document.getElementById('modal-detail').style.display = "none"; 
            // Kembalikan Judul App saat modal ditutup
            document.title = ORIGINAL_APP_TITLE;
        }
    </script>
</body>
</html>
