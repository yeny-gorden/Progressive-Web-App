<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="logo.png">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW Registered!', reg))
            .catch(err => console.log('SW Registration Failed', err));
        });
      }
    </script>

    <title>Kalkulator Gorden Pro v4.1 - Yeny Gorden</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main);
            margin: 0; padding: 15px;
            font-size: 14px;
        }

        .container { max-width: 600px; margin: auto; }

        .card { 
            background: var(--bg-card); 
            padding: 20px; border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); 
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { font-size: 1rem; color: var(--primary); margin: 0; text-transform: uppercase; }

        .btn-config {
            background: #475569;
            color: white;
            border: none; padding: 6px 12px; border-radius: 6px;
            font-size: 0.75rem; cursor: pointer; font-weight: bold;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }

        label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px; font-weight: bold; }
        input, select { 
            width: 100%; padding: 12px; background: var(--input-bg); 
            border: 1px solid var(--border); border-radius: 8px; 
            color: white; box-sizing: border-box; margin-bottom: 10px; font-size: 0.95rem;
        }

        .search-box { 
            border: 2px solid var(--primary) !important; 
            background: rgba(59, 130, 246, 0.1) !important;
            font-weight: bold;
        }

        .category-toggle { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-tab { 
            flex: 1; padding: 10px; border: 2px solid var(--border); 
            background: transparent; color: var(--text-dim); 
            border-radius: 8px; font-weight: bold; cursor: pointer; 
        }
        .btn-tab.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); color: var(--primary); }

        .window-item { 
            background: var(--bg-card); padding: 15px; border-radius: 12px; 
            margin-bottom: 15px; border: 1px solid var(--border); position: relative; 
        }
        
        .win-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .win-title { font-size: 0.9rem; color: var(--primary); font-weight: bold; border-bottom: 1px dashed var(--border); cursor: pointer; }

        .btn-mini { padding: 4px 8px; border-radius: 4px; font-size: 10px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-remove { background: var(--danger); }

        .checkbox-inline { display: flex; align-items: center; gap: 8px; color: var(--success); cursor: pointer; margin: 10px 0; font-size: 0.8rem; }
        .checkbox-inline input { width: auto !important; margin: 0 !important; }

        .btn-main { 
            width: 100%; padding: 14px; border-radius: 10px; border: none; 
            font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px;
        }
        .btn-add { background: transparent; border: 2px dashed var(--border); color: var(--text-dim); }

        .hidden { display: none; }
        .vitrase-section { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 3px solid var(--success); }

        .rincian-box {
            margin-top: 10px; padding: 10px; background: #0f172a; 
            border-radius: 8px; font-size: 0.75rem; color: #10b981; 
            line-height: 1.6; border: 1px solid #1e293b;
        }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--bg-card); padding: 20px; border-radius: 15px;
            width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto;
        }

        #printArea { margin-top: 25px; border-top: 2px solid var(--border); padding-top: 20px; }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body oninput="hitungFinal()">

<div class="container no-print">
    <div class="card">
        <div class="header-row">
            <h2>🧾 Informasi Pelanggan</h2>
            <button id="btnEditHarga" class="btn-config hidden" onclick="openModal()">⚙️ EDIT HARGA</button>
        </div>
        <div class="form-grid">
            <div class="full-width">
                <label>Nama Pelanggan</label>
                <input type="text" id="custNama" placeholder="Nama lengkap">
            </div>
            <div><label>WhatsApp</label><input type="tel" id="custTelp" placeholder="08..."></div>
            <div><label>Alamat</label><input type="text" id="custAlamat" placeholder="Kota/Kecamatan"></div>
        </div>
        <div style="font-size: 0.7rem; color: var(--text-dim); margin-top: 10px;">
            <span id="syncStatus">🔄 Menghubungkan...</span>
            <input type="file" id="fileKatalog" onchange="loadKatalogManual(event)" style="display: none;">
            <br><span style="color:var(--primary); cursor:pointer" onclick="document.getElementById('fileKatalog').click()">Upload Manual</span>
        </div>
    </div>

    <div id="windowContainer"></div>
    <button class="btn-main btn-add" onclick="addWindow()">+ TAMBAH JENDELA / ITEM</button>

    <div class="card" style="margin-top: 20px;">
        <h2>🛠️ Biaya Tambahan & Pembayaran</h2>
        <div class="form-grid">
            <div><label>Jasa Pasang (Rp)</label><input type="number" id="extraPasang" value="0"></div>
            <div><label>Diskon (%)</label><input type="number" id="extraDiskon" value="0" placeholder="Contoh: 10"></div>
            <div class="full-width"><label>Uang Muka / DP (Rp)</label><input type="number" id="extraDP" value="0" style="border: 2px solid var(--success);"></div>
        </div>
    </div>

    <div class="form-grid">
        <button class="btn-main" style="background: var(--primary);" onclick="printDoc('Estimasi')">🖨️ CETAK ESTIMASI / INV</button>
        <button class="btn-main" style="background: var(--success);" onclick="printDoc('SPK')">📝 CETAK SPK</button>
    </div>
</div>

<div id="printArea" class="container"></div>

<div id="modalHarga" class="modal">
    <div class="modal-content">
        <h2>⚙️ Harga Aksesoris</h2>
        <div id="modalForm"></div>
        <button class="btn-main" onclick="closeModal()" style="background: var(--success);">SIMPAN & TUTUP</button>
    </div>
</div>

<script>
    // URL Web App Google Script Anda (Pusat Sinkronisasi)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz39qn--eLE4vdOlRLM8G1GjQBe-sHZoH0GZelnZzPVh8ES7IWER3w93kPdccZ5ohSF/exec";
    const JSON_URL = WEB_APP_URL; // Mengambil katalog langsung dari Sheet

    let KATALOG = null;
    let winIdx = 0;
    const LOGO_URL = "https://yeny-gorden.github.io/Progressive-Web-App/logo.png";

    window.onload = async () => {
        try {
            // Mengambil data real-time dari Google Sheets
            const response = await fetch(JSON_URL);
            if(response.ok) {
                KATALOG = await response.json();
                onKatalogLoaded("✅ Online (Sheets)", "var(--success)");
            } else {
                throw new Error("Gagal load");
            }
        } catch (err) {
            // Jika gagal, gunakan data default agar aplikasi tetap bisa jalan
            KATALOG = {
                "kain": [{ "nama": "Sample Kain", "harga": 150000, "tipe": "Bidang Besar" }],
                "aksesoris_default": { "jahit": 20000, "smokring": 4500, "rollet": 65000, "rell": 50000, "hook": 40000, "tali": 38000, "stick": 50000, "pasang": 50000, "harga_vitrase_default": 100000 }
            };
            onKatalogLoaded("⚠️ Mode Offline", "var(--text-dim)");
        }
    };

    function onKatalogLoaded(msg, color) {
        document.getElementById('syncStatus').innerText = msg;
        document.getElementById('syncStatus').style.color = color;
        document.getElementById('btnEditHarga').classList.remove('hidden');
        if(winIdx === 0) addWindow();
        initModalFields();
        hitungFinal();
    }

    function loadKatalogManual(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            KATALOG = JSON.parse(event.target.result);
            onKatalogLoaded("✅ Manual", "var(--primary)");
            updateSemuaProdukDropdown();
        };
        reader.readAsText(e.target.files[0]);
    }

    // Fungsi untuk mengupdate dropdown jika katalog berubah
    function updateSemuaProdukDropdown() {
        document.querySelectorAll('[id^="produk-"]').forEach(select => {
            select.innerHTML = KATALOG.kain.map((k, i) => `<option value="${i}">${k.nama} - Rp ${k.harga.toLocaleString()}</option>`).join('');
        });
    }

    function filterKatalog(idx, key) {
        const select = document.getElementById(`produk-${idx}`);
        const lowKey = key.toLowerCase();
        let firstMatch = -1;
        Array.from(select.options).forEach((opt, i) => {
            const match = opt.text.toLowerCase().includes(lowKey);
            opt.style.display = match ? "" : "none";
            if (match && firstMatch === -1) firstMatch = i;
        });
        if (firstMatch !== -1 && key !== "") select.selectedIndex = firstMatch;
        hitungFinal();
    }

    function addWindow() {
        if(!KATALOG) return;
        winIdx++;
        const div = document.createElement('div');
        div.className = 'window-item';
        div.id = `win-block-${winIdx}`;
        div.innerHTML = `
            <div class="win-header">
                <span class="win-title" id="title-text-${winIdx}" onclick="this.innerText=prompt('Nama Ruangan:', this.innerText); hitungFinal();">ITEM #${winIdx}</span>
                <button class="btn-mini btn-remove" onclick="document.getElementById('win-block-${winIdx}').remove(); hitungFinal();">HAPUS</button>
            </div>
            <div class="category-toggle">
                <button id="tab-g-${winIdx}" class="btn-tab active" onclick="setKategori(${winIdx}, 'Gorden')">GORDEN</button>
                <button id="tab-b-${winIdx}" class="btn-tab" onclick="setKategori(${winIdx}, 'Blind')">BLINDS</button>
            </div>
            <input type="hidden" id="kategori-${winIdx}" value="Gorden">
            <div id="form-gorden-${winIdx}">
                <div class="form-grid">
                    <div class="full-width"><select id="model-g-${winIdx}" onchange="hitungFinal()"><option value="Grommet">Grommet</option><option value="Pleats">Pleats</option><option value="Tab Top">Tab Top</option></select></div>
                    <div class="full-width">
                        <label>Cari Kain</label>
                        <input type="text" class="search-box" placeholder="Ketik nama kain..." oninput="filterKatalog(${winIdx}, this.value)">
                        <select id="produk-${winIdx}" onchange="hitungFinal()">
                            ${KATALOG.kain.map((k, i) => `<option value="${i}">${k.nama} - Rp ${k.harga.toLocaleString()}</option>`).join('')}
                        </select>
                    </div>
                    <div><label>Code/Warna</label><input type="text" placeholder="#1 green" id="color-g-${winIdx}"></div>
                    <div><label>Panel</label><input type="number" id="panel-g-${winIdx}" value="2"></div>
                    <div><label>Lebar (m)</label><input type="number" placeholder="1.5" id="L-${winIdx}" step="0.01"></div>
                    <div><label>Tinggi(m)</label><input type="number" placeholder="2.5" id="T-${winIdx}" step="0.01"></div>
                </div>
                <label class="checkbox-inline"><input type="checkbox" id="v-check-${winIdx}" onchange="document.getElementById('vit-sec-${winIdx}').classList.toggle('hidden'); hitungFinal();"> + Vitrase</label>
                <div id="vit-sec-${winIdx}" class="vitrase-section hidden">
                    <select id="v-model-${winIdx}" onchange="document.getElementById('v-spiral-box-${winIdx}').classList.toggle('hidden', this.value!=='Spiral'); hitungFinal();"><option value="Pleats">Pleats</option><option value="Spiral">Spiral</option></select>
                    <input type="text" id="color-v-${winIdx}" placeholder="Code/Warna Vitrase">
                    <div id="v-spiral-box-${winIdx}" class="hidden form-grid" style="margin-top:10px">
                        <input type="number" id="v-L-${winIdx}" placeholder="Lebar" step="0.01">
                        <input type="number" id="v-T-${winIdx}" placeholder="Tinggi" step="0.01">
                        <input type="number" id="v-Q-${winIdx}" value="1">
                    </div>
                </div>
                <div id="rincian-${winIdx}" class="rincian-box"></div>
            </div>
            <div id="form-blind-${winIdx}" class="hidden">
                <div class="form-grid">
                    <div class="full-width"><label>Nama Blind</label><input type="text" id="nama-blind-${winIdx}" placeholder="Contoh: Roller Blind Blackout"></div>
                    <div><label>Lebar (m)</label><input type="number" id="LB-${winIdx}" placeholder="1.0" step="0.01"></div>
                    <div><label>Tinggi (m)</label><input type="number" id="TB-${winIdx}" placeholder="1.0" step="0.01"></div>
                    <div class="full-width"><label>Harga/m2 (Rp)</label><input type="number" id="harga-blind-${winIdx}" placeholder="350000"></div>
                </div>
                <div id="rincian-blind-${winIdx}" class="rincian-box"></div>
            </div>
        `;
        document.getElementById('windowContainer').appendChild(div);
        hitungFinal();
    }

    function setKategori(idx, kat) {
        document.getElementById(`kategori-${idx}`).value = kat;
        document.getElementById(`tab-g-${idx}`).className = kat === 'Gorden' ? 'btn-tab active' : 'btn-tab';
        document.getElementById(`tab-b-${idx}`).className = kat === 'Blind' ? 'btn-tab active' : 'btn-tab';
        document.getElementById('form-gorden-'+idx).classList.toggle('hidden', kat !== 'Gorden');
        document.getElementById('form-blind-'+idx).classList.toggle('hidden', kat !== 'Blind');
        hitungFinal();
    }

    function formatRp(n) { return "Rp " + Math.round(n).toLocaleString('id-ID'); }

    function generatePrintHeader(title) {
        return `
            <div style="display:flex; align-items:center; border-bottom:3px solid #000; padding-bottom:10px; margin-bottom:15px; font-family:Arial; color:#000;">
                <img src="${LOGO_URL}" style="width:70px; height:70px; margin-right:15px; object-fit:contain;">
                <div>
                    <strong style="font-size:22px; display:block;">YENY GORDEN</strong>
                    <span style="font-size:12px; font-weight:bold;">Tlp: 089504215020 <br> Email: yenygorden@gmail.com</span><br>
                    <span style="font-size:12px; font-weight:bold;">Tgl: ${new Date().toLocaleDateString('id-ID')}</span>
                </div>
            </div>
            <div style="font-family:Arial; font-weight:bold; color:#000; font-size:13px; margin-bottom:15px;">
                <center><u style="font-size:16px;">${title}</u></center><br>
                Nama: ${document.getElementById('custNama').value || "-"}<br>
                Alamat: ${document.getElementById('custAlamat').value || "-"}<br>
                Tlp: ${document.getElementById('custTelp').value || "-"}
            </div>
        `;
    }

    let lastCalculationData = {};

    function hitungFinal() {
        if(!KATALOG) return;
        const aks = KATALOG.aksesoris_default;
        let total = 0, bodyE = "", bodyS = "";
        let rincianFullText = "";

        document.querySelectorAll('.window-item').forEach(win => {
            const id = win.id.split('-')[2];
            const kat = document.getElementById(`kategori-${id}`).value;
            const rNama = document.getElementById(`title-text-${id}`).innerText.trim().toUpperCase();

            if(kat === 'Gorden') {
                const model = document.getElementById(`model-g-${id}`).value;
                const L = parseFloat(document.getElementById(`L-${id}`).value) || 0;
                const T = parseFloat(document.getElementById(`T-${id}`).value) || 0;
                const prodIndex = document.getElementById(`produk-${id}`).value;
                const prod = KATALOG.kain[prodIndex];
                const colG = document.getElementById(`color-g-${id}`).value || "-";
                const pan = document.getElementById(`panel-g-${id}`).value || 2;

                let mK = 0;
                if(prod.tipe === "Bidang Besar") {
                    mK = (L + 0.2) * 3;
                } else {
                    let jmlGel = Math.ceil((L + 0.2) / 0.4);
                    mK = jmlGel * (T + 0.3);
                }
                
                if(model === "Tab Top") mK += 0.5;

                const biayaKain = mK * prod.harga;
                const biayaJahit = mK * (aks.jahit || 20000);
                const jmlRollet = Math.max(1, Math.ceil(L));
                const biayaRollet = jmlRollet * (aks.rollet || 65000);
                const biayaHook = aks.hook || 0;
                const biayaTali = aks.tali || 0;
                
                let sub = biayaKain + biayaJahit + biayaRollet + biayaHook + biayaTali;
                
                let rincianArr = [];
                rincianArr.push(`Kain Gorden (${prod.nama}) | ${mK.toFixed(2)}m : ${formatRp(biayaKain)}`);
                rincianArr.push(`Jasa Jahit Gorden | ${mK.toFixed(2)}m : ${formatRp(biayaJahit)}`);
                rincianArr.push(`Rollet/Rel Gorden | ${jmlRollet}m : ${formatRp(biayaRollet)}`);
                rincianArr.push(`Hook Gorden | 1 set : ${formatRp(biayaHook)}`);
                rincianArr.push(`Tali Gorden | 1 set : ${formatRp(biayaTali)}`);

                if(model === 'Grommet') {
                    const hargaGrommet = aks.smokring || 4500;
                    const jmlGrommet = Math.ceil(L * 24);
                    const biayaGrom = jmlGrommet * hargaGrommet;
                    sub += biayaGrom;
                    rincianArr.push(`Grommet/Smokring | ${jmlGrommet}pcs : ${formatRp(biayaGrom)}`);
                }
                
                let detail = `${rNama}\n${prod.nama} / ${colG} / ${L}x${T} / ${model} / ${pan} Panel`;
                let vitLine = "";

                if(!document.getElementById(`vit-sec-${id}`).classList.contains('hidden')) {
                    const vM = document.getElementById(`v-model-${id}`).value;
                    const vCol = document.getElementById(`color-v-${id}`).value || "-";
                    let vL = (vM === 'Spiral') ? (parseFloat(document.getElementById(`v-L-${id}`).value) || 0) : L;
                    let vT = (vM === 'Spiral') ? (parseFloat(document.getElementById(`v-T-${id}`).value) || 0) : T;
                    let vQ = (vM === 'Spiral') ? (parseInt(document.getElementById(`v-Q-${id}`).value) || 1) : 1;
                    
                    let mV = (vL + 0.2) * 3 * vQ;
                    let biayaVit = mV * (aks.harga_vitrase_default || 100000);
                    let jahitVit = mV * 20000;
                    
                    let alatVit = 0;
                    let namaAlatVit = "";
                    let qtyAlatVit = 0;

                    if(vM === 'Spiral') {
                        qtyAlatVit = vQ;
                        alatVit = aks.stick * qtyAlatVit;
                        namaAlatVit = "Stick Spiral";
                    } else {
                        qtyAlatVit = Math.max(1, Math.ceil(vL));
                        alatVit = qtyAlatVit * aks.rell;
                        namaAlatVit = "Rel Vitrase";
                    }
                    
                    let subV = biayaVit + jahitVit + alatVit;
                    sub += subV;
                    vitLine = `\nVitrase: ${vM} / ${vCol} / ${vL}x${vT} / Qty: ${vQ}`;
                    
                    rincianArr.push(`---`);
                    rincianArr.push(`Kain Vitrase | ${mV.toFixed(2)}m : ${formatRp(biayaVit)}`);
                    rincianArr.push(`Jasa Jahit Vitrase | ${mV.toFixed(2)}m : ${formatRp(jahitVit)}`);
                    rincianArr.push(`${namaAlatVit} | ${qtyAlatVit}${vM==='Spiral'?'set':'m'} : ${formatRp(alatVit)}`);
                }

                document.getElementById(`rincian-${id}`).innerHTML = rincianArr.join('<br>');
                rincianFullText += `\n[ ${rNama} ]\n${detail}${vitLine}\nSubtotal: ${formatRp(sub)}\n`;

                total += sub;
                let htmlDetail = detail.replace(/\n/g, "<br>") + vitLine.replace(/\n/g, "<br>");
                bodyE += `<div style="margin-bottom:10px; font-family:Arial; font-weight:bold; color:#000; border-bottom:1px solid #eee;">${htmlDetail}<div style="text-align:right;">${formatRp(sub)}</div></div>`;
                bodyS += `<div style="margin-bottom:10px; font-family:Arial; font-weight:bold; color:#000; border-bottom:1px solid #000; padding-bottom:5px;">${htmlDetail}</div>`;
            } 
            else if (kat === 'Blind') {
                const nB = document.getElementById(`nama-blind-${id}`).value || "Blind";
                const LB = parseFloat(document.getElementById(`LB-${id}`).value) || 0;
                const TB = parseFloat(document.getElementById(`TB-${id}`).value) || 0;
                const hB = parseFloat(document.getElementById(`harga-blind-${id}`).value) || 0;

                let luas = Math.max(1, (LB * TB));
                let subB = luas * hB;

                let detailB = `${rNama}\n${nB} | ${LB}m x ${TB}m | Luas: ${luas.toFixed(2)}m2`;
                
                document.getElementById(`rincian-blind-${id}`).innerHTML = `<b>${nB}</b><br>Luas: ${luas.toFixed(2)}m2 x ${formatRp(hB)}<br>Subtotal: ${formatRp(subB)}`;
                rincianFullText += `\n[ ${rNama} ]\n${detailB}\nSubtotal: ${formatRp(subB)}\n`;

                total += subB;
                let htmlDetailB = detailB.replace(/\n/g, "<br>");
                bodyE += `<div style="margin-bottom:10px; font-family:Arial; font-weight:bold; color:#000; border-bottom:1px solid #eee;">${htmlDetailB}<div style="text-align:right;">${formatRp(subB)}</div></div>`;
                bodyS += `<div style="margin-bottom:10px; font-family:Arial; font-weight:bold; color:#000; border-bottom:1px solid #000; padding-bottom:5px;">${htmlDetailB}</div>`;
            }
        });

        const pas = parseFloat(document.getElementById('extraPasang').value) || 0;
        const disPersen = parseFloat(document.getElementById('extraDiskon').value) || 0;
        const dp = parseFloat(document.getElementById('extraDP').value) || 0;
        
        const totalSebelumDiskon = total + pas;
        const disNominal = totalSebelumDiskon * (disPersen / 100);
        const grandTotal = totalSebelumDiskon - disNominal;
        const sisa = grandTotal - dp;

        const isInvoice = dp > 0;
        const titleDoc = isInvoice ? 'INVOICE PEMBAYARAN' : 'ESTIMASI BIAYA GORDEN';
        const labelCatatan = isInvoice ? 'Batas waktu pelunasan' : 'Estimasi berlaku hingga';
        
        const expDate = new Date();
        expDate.setDate(expDate.getDate() + 7);
        const expString = expDate.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

        lastCalculationData = {
            nama: document.getElementById('custNama').value,
            telp: document.getElementById('custTelp').value,
            alamat: document.getElementById('custAlamat').value,
            rincianText: rincianFullText,
            grandTotal: grandTotal,
            dp: dp,
            sisa: sisa
        };

        document.body.dataset.estimasi = `
            <div style="background:#fff; padding:10px;">
                ${generatePrintHeader(titleDoc)}
                ${bodyE}
                <div style="border-top:2px solid #000; font-family:Arial; font-weight:bold; color:#000; padding-top:5px;">
                    ${disPersen > 0 ? `<div style="display:flex; justify-content:space-between; color:red"><span>Diskon (${disPersen}%):</span><span>- ${formatRp(disNominal)}</span></div>` : ''}
                    <div style="display:flex; justify-content:space-between; font-size:16px; margin-top:5px; border-top:1px solid #000;"><span>TOTAL:</span><span>${formatRp(grandTotal)}</span></div>
                    ${dp > 0 ? `
                    <div style="display:flex; justify-content:space-between; color:green; margin-top:5px;"><span>DP / Uang Muka:</span><span>- ${formatRp(dp)}</span></div>
                    <div style="display:flex; justify-content:space-between; font-size:18px; margin-top:5px; background:#eee; padding:5px;"><span>SISA TAGIHAN:</span><span>${formatRp(sisa)}</span></div>
                    ` : ''}
                </div>
                <div style="margin-top:20px; border: 1px solid #000; padding: 10px; font-family:Arial; font-weight:bold; color:#000;">
                    <div style="font-size:12px; text-decoration:underline; margin-bottom:5px;">Instruksi Pembayaran:</div>
                    Bank BCA <br> No. Rek: 0463191163 <br> A/n: Eko Triono
                </div>
                <div style="margin-top:20px; color:red; font-family:Arial; font-weight:bold; font-size:11px;">
                    * ${labelCatatan} ${expString}.<br>
                    * Harga sudah ${pas > 0 ? 'termasuk biaya aksesoris, jahit dan pasang.' : 'termasuk biaya aksesoris dan jahit.'}
                </div>
            </div>
        `;

        document.body.dataset.spk = `
            <div style="background:#fff; padding:10px;">
                ${generatePrintHeader('SURAT PERINTAH KERJA (SPK)')}
                ${bodyS}
                <br><br>
                <div style="display:flex; justify-content:space-between; text-align:center; font-family:Arial; font-weight:bold; color:#000;">
                    <div>Pelanggan<br><br><br>(................)</div>
                    <div>Admin<br><br><br>(................)</div>
                </div>
            </div>
        `;
        document.getElementById('printArea').innerHTML = document.body.dataset.estimasi;
    }

    async function kirimKeServer(type) {
        if(!lastCalculationData.nama) return;
        const data = { tipe: type, ...lastCalculationData };
        try {
            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        } catch (e) { console.error(e); }
    }

    function printDoc(type) {
        kirimKeServer(type);
        const content = (type === 'Estimasi') ? document.body.dataset.estimasi : document.body.dataset.spk;
        let printFrame = document.getElementById('printFrame');
        if (!printFrame) {
            printFrame = document.createElement('iframe');
            printFrame.id = 'printFrame';
            printFrame.style.display = 'none';
            document.body.appendChild(printFrame);
        }
        const doc = printFrame.contentWindow.document;
        doc.open();
        doc.write(`<html><head><style>@page{margin:0.5cm;} body{margin:0; font-family:Arial; font-weight:bold; color:#000;}</style></head><body>${content}</body></html>`);
        doc.close();
        setTimeout(() => {
            printFrame.contentWindow.focus();
            printFrame.contentWindow.print();
        }, 500);
    }

    function initModalFields() {
        if(!KATALOG) return;
        const aks = KATALOG.aksesoris_default;
        const container = document.getElementById('modalForm');
        container.innerHTML = "";
        for (let key in aks) {
            let labelText = key.toUpperCase().replace(/_/g, " ");
            if(labelText === 'SMOKRING') labelText = 'GROMMET';
            container.innerHTML += `<label>${labelText}</label><input type="number" value="${aks[key]}" oninput="KATALOG.aksesoris_default['${key}']=parseFloat(this.value); hitungFinal();">`;
        }
    }
    function openModal() { document.getElementById('modalHarga').style.display = 'flex'; }
    function closeModal() { document.getElementById('modalHarga').style.display = 'none'; }
</script>

</body>
</html>
