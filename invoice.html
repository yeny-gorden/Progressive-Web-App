<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Invoice & Estimasi Mandiri</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #cbd5e1;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f5f9; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 900px; background: #fff; margin: 0 auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: relative; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        .invoice-title-area { text-align: right; }
        h2 { margin: 0; font-size: 2rem; color: var(--primary); }
        .badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; border: 1px solid transparent; margin-top: 5px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; outline: none; }
        input:focus { border-color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background-color: var(--light); }
        .btn { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .btn-danger { background: #dc2626; }
        .btn-success { background: var(--success); }
        .summary-area { width: 50%; margin-left: auto; margin-top: 20px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .summary-row input { width: 60%; text-align: right; }
        .stamp { position: absolute; top: 150px; right: 50px; border: 4px dashed var(--success); color: var(--success); font-size: 2rem; font-weight: 800; padding: 10px 20px; transform: rotate(-15deg); border-radius: 8px; display: none; opacity: 0.8; user-select: none; }
        #qrcode { margin-top: 15px; display: flex; justify-content: flex-end; }
    </style>
    <!-- Library QRCode Mandiri -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <!-- Cap Lunas Otomatis -->
    <div id="stamp" class="stamp">LUNAS</div>

    <div class="header">
        <div>
            <h3>NAMA PERUSAHAAN ANDA</h3>
            <p style="font-size: 0.85rem; color: #64748b; margin: 0;">Alamat Kantor Pembuat Nota, No. HP / Email</p>
        </div>
        <div class="invoice-title-area">
            <!-- ID Judul Ditambahkan di Sini untuk Perubahan Dinamis -->
            <h2 id="invoice-title">INVOICE</h2>
            <div id="status-badge" class="badge">STATUS: BARU (DRAFT)</div>
        </div>
    </div>

    <div class="grid-2">
        <div>
            <div class="form-group">
                <label>Nomor Nota / Invoice</label>
                <input type="text" id="invoice-number" placeholder="Contoh: INV-2026-001">
            </div>
            <div class="form-group">
                <label>Tanggal Nota</label>
                <input type="date" id="invoice-date">
            </div>
        </div>
        <div>
            <div class="form-group">
                <label>Pelanggan / Kepada Yth.</label>
                <input type="text" id="customer-name" placeholder="Nama Pelanggan">
            </div>
            <div class="form-group">
                <label>Kontak Pelanggan</label>
                <input type="text" id="customer-contact" placeholder="No. HP / Alamat">
            </div>
        </div>
    </div>

    <table id="invoice-table">
        <thead>
            <tr>
                <th>Deskripsi Item / Layanan</th>
                <th style="width: 100px;">Qty</th>
                <th style="width: 150px;">Harga Satuan</th>
                <th style="width: 150px;">Total</th>
                <th style="width: 80px;">Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" class="desc" placeholder="Nama barang/jasa"></td>
                <td><input type="number" class="qty" value="1" oninput="calculateTotal()"></td>
                <td><input type="number" class="price" value="0" oninput="calculateTotal()"></td>
                <td><input type="number" class="row-total" value="0" readonly></td>
                <td><button class="btn btn-danger" onclick="deleteRow(this)">Hapus</button></td>
            </tr>
        </tbody>
    </table>

    <button class="btn" onclick="addRow()">+ Tambah Item</button>

    <div class="summary-area">
        <div class="summary-row">
            <label>Subtotal</label>
            <input type="number" id="subtotal" value="0" readonly>
        </div>
        <div class="summary-row">
            <label>Diskon <span id="discount-label" style="font-size: 0.8rem; color: var(--primary);"></span></label>
            <input type="text" id="discount-amount" placeholder="0 atau 10%" oninput="calculateTotal()">
        </div>
        <div class="summary-row">
            <label>PPN (%)</label>
            <input type="number" id="ppn-rate" value="0" min="0" oninput="calculateTotal()">
        </div>
        <div class="summary-row">
            <label>Biaya Pengiriman</label>
            <input type="number" id="shipping-cost" value="0" oninput="calculateTotal()">
        </div>
        <div class="summary-row" style="border-top: 1px solid var(--border); padding-top: 8px;">
            <label><strong>Total Akhir</strong></label>
            <input type="number" id="grand-total" value="0" readonly style="font-weight: bold;">
        </div>
        <div class="summary-row">
            <label>Total Masuk (DP/Cicilan)</label>
            <input type="number" id="dp-amount" value="0" oninput="calculateTotal()">
        </div>
        <div class="summary-row" style="color: #dc2626;">
            <label><strong>Sisa Pembayaran</strong></label>
            <input type="number" id="balance-due" value="0" readonly style="font-weight: bold; color: #dc2626;">
        </div>
        
        <!-- Area Barcode/QRCode -->
        <div id="qrcode"></div>
    </div>
</div>

<script type="module">
    let isLunas = false;
    let qrcodeInstance = null;

    // Set tanggal hari ini sebagai default
    document.getElementById('invoice-date').value = new Date().toISOString().substring(0, 10);

    window.addRow = function() {
        const tbody = document.getElementById('invoice-table').getElementsByTagName('tbody')[0];
        const newRow = tbody.insertRow();
        newRow.innerHTML = `
            <td><input type="text" class="desc" placeholder="Nama barang/jasa"></td>
            <td><input type="number" class="qty" value="1" oninput="calculateTotal()"></td>
            <td><input type="number" class="price" value="0" oninput="calculateTotal()"></td>
            <td><input type="number" class="row-total" value="0" readonly></td>
            <td><button class="btn btn-danger" onclick="deleteRow(this)">Hapus</button></td>
        `;
        window.calculateTotal();
    }

    window.deleteRow = function(button) {
        const row = button.parentNode.parentNode;
        const tbody = row.parentNode;
        if (tbody.rows.length > 1) {
            tbody.removeChild(row);
            window.calculateTotal();
        } else {
            alert("Minimal harus ada 1 item di dalam nota!");
        }
    }

    window.calculateTotal = function() {
        const rows = document.getElementById('invoice-table').getElementsByTagName('tbody')[0].rows;
        let subtotal = 0;
        
        for (let i = 0; i < rows.length; i++) {
            const qty = parseFloat(rows[i].querySelector('.qty').value) || 0;
            const price = parseFloat(rows[i].querySelector('.price').value) || 0;
            const totalRow = qty * price;
            rows[i].querySelector('.row-total').value = totalRow;
            subtotal += totalRow;
        }
        document.getElementById('subtotal').value = subtotal;
        
        // Proteksi string kosong/NaN pada diskon
        const discountInput = (document.getElementById('discount-amount').value || "0").toString();
        let discountCalculated = 0;
        const discountLabel = document.getElementById('discount-label');

        if (discountInput && discountInput !== "0") {
            if (discountInput.includes('%') || discountInput.length <= 2) {
                const pct = parseFloat(discountInput) || 0;
                discountCalculated = (pct / 100) * subtotal;
                discountLabel.innerText = `(${pct}%)`;
            } else {
                discountCalculated = parseFloat(discountInput) || 0;
                discountLabel.innerText = "";
            }
        } else {
            discountLabel.innerText = "";
        }

        const ppnRate = parseFloat(document.getElementById('ppn-rate').value) || 0;
        const shippingCost = parseFloat(document.getElementById('shipping-cost').value) || 0;
        
        const totalAfterDiscount = subtotal - discountCalculated;
        const ppnAmount = (ppnRate / 100) * totalAfterDiscount;
        
        const grandTotal = totalAfterDiscount + ppnAmount + shippingCost;
        document.getElementById('grand-total').value = grandTotal;

        const dp = parseFloat(document.getElementById('dp-amount').value) || 0;
        
        let sisaAkhir = grandTotal - dp;
        if (sisaAkhir < 0) sisaAkhir = 0;
        document.getElementById('balance-due').value = sisaAkhir;

        // --- SISTEM DINAMIS PENGUBAH JUDUL (INVOICE / ESTIMASI) ---
        const invoiceTitle = document.getElementById('invoice-title');
        if (dp === 0) {
            invoiceTitle.innerText = "ESTIMASI";
        } else {
            invoiceTitle.innerText = "INVOICE";
        }

        // Perubahan Status Badge & Cap
        const badge = document.getElementById('status-badge');
        if (sisaAkhir <= 0 && subtotal > 0) {
            isLunas = true;
            document.getElementById('stamp').style.display = 'block';
            badge.innerText = "STATUS: LUNAS";
            badge.style.cssText = "background-color: #dcfce7; color: var(--success); border-color: #22c55e;";
        } else {
            document.getElementById('stamp').style.display = 'none';
            if (dp > 0) {
                isLunas = false;
                badge.innerText = "STATUS: BELUM LUNAS (DP)";
                badge.style.cssText = "background-color: #fef3c7; color: #b45309; border-color: #f59e0b;";
            } else {
                isLunas = false;
                badge.innerText = "STATUS: BARU (DRAFT)";
                badge.style.cssText = "background-color: #f1f5f9; color: #475569; border-color: #94a3b8;";
            }
        }
        window.updateQRCode();
    }

    window.updateQRCode = function() {
        const invNum = document.getElementById('invoice-number').value || "DRAFT";
        const total = document.getElementById('grand-total').value || 0;
        const sisa = document.getElementById('balance-due').value || 0;
        const statusText = isLunas ? "LUNAS" : `SISA: Rp ${sisa}`;
        
        const qrContent = `Nota: ${invNum} | Total: Rp ${total} | Status: ${statusText}`;
        
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = ""; 
        
        qrcodeInstance = new QRCode(qrContainer, {
            text: qrContent,
            width: 100,
            height: 100,
            colorDark: "#0f172a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    }

    // Inisialisasi awal saat halaman dimuat
    window.calculateTotal();
</script>

</body>
</html>
